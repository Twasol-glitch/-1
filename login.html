<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Review | Login</title>

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="responsive.css">
</head>

<body>

<div class="login-box">

    <h1 id="title">📚 Book Review</h1>

    <button id="langBtn">🌐 العربية | English</button>

    <h2 id="loginText">تسجيل الدخول</h2>

    <form id="loginForm">

        <input
        type="email"
        id="email"
        placeholder="البريد الإلكتروني"
        required>

        <input
        type="password"
        id="password"
        placeholder="كلمة المرور"
        required>

        <button type="submit" id="loginBtn">
            تسجيل الدخول
        </button>

    </form>

    <p id="registerText">
        ليس لديك حساب؟
        <a href="register.html" id="registerLink">
            إنشاء حساب
        </a>
    </p>

</div>

<script src="script.js"></script>
<script src="language.js"></script>

</body>
</html>
