<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Book Review | Login</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>

<body>

<div class="container">

<div class="login-box">

<h1>📚 Book Review</h1>

<p>تسجيل الدخول | Login</p>

<form id="loginForm">

<div class="input-box">

<i class="fa fa-envelope"></i>

<input
type="email"
id="email"
placeholder="البريد الإلكتروني | Email"
required>

</div>

<div class="input-box">

<i class="fa fa-lock"></i>

<input
type="password"
id="password"
placeholder="كلمة المرور | Password"
required>

</div>

<button type="submit">
Login
</button>

</form>

<p class="link">

ليس لديك حساب؟

<a href="register.html">
إنشاء حساب
</a>

</p>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
