<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Review | Register</title>

    <link rel="stylesheet" href="style.css">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

<div class="container">

<div class="login-box">

<h1>📚 Book Review</h1>

<p>إنشاء حساب | Register</p>

<form id="registerForm">

<div class="input-box">
<i class="fa fa-user"></i>

<input
type="text"
id="name"
placeholder="الاسم | Name"
required>

</div>

<div class="input-box">
<i class="fa fa-envelope"></i>

<input
type="email"
id="email"
placeholder="البريد الإلكتروني | Email"
required>

</div>

<div class="input-box">
<i class="fa fa-lock"></i>

<input
type="password"
id="password"
placeholder="كلمة المرور | Password"
required>

</div>

<div class="input-box">
<i class="fa fa-lock"></i>

<input
type="password"
id="confirmPassword"
placeholder="تأكيد كلمة المرور | Confirm Password"
required>

</div>

<button type="submit">
Create Account
</button>

</form>

<p class="link">

لديك حساب بالفعل؟

<a href="index.html">
تسجيل الدخول
</a>

</p>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
